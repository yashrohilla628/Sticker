<!DOCTYPE html>
<html>
<head>
<title>Food Stickers</title>
<style>
body{font-family:Arial;background:#f2f2f2;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:20px;max-width:900px;margin:auto;}
.sticker{background:white;padding:20px;border-radius:10px;box-shadow:0 5px 10px rgba(0,0,0,0.2);}
.sticker span{font-size:60px;}
</style>
</head>
<body>
<h1>🍔 Food Stickers</h1>
<div class="grid">
<div class="sticker"><span>🍕</span><p>Pizza</p></div>
<div class="sticker"><span>🍔</span><p>Burger</p></div>
<div class="sticker"><span>🍟</span><p>Fries</p></div>
<div class="sticker"><span>🍩</span><p>Donut</p></div>
<div class="sticker"><span>🍦</span><p>Ice Cream</p></div>
<div class="sticker"><span>🍰</span><p>Cake</p></div>
<div class="sticker"><span>🌮</span><p>Taco</p></div>
<div class="sticker"><span>🍣</span><p>Sushi</p></div>
</div>
<br>
<a href="index.html">⬅ Back</a>
</body>
</html>
