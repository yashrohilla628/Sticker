<!DOCTYPE html>
<html>
<head>
<title>Space Stickers</title>
<style>
body{font-family:Arial;background:#f2f2f2;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:20px;max-width:900px;margin:auto;}
.sticker{background:white;padding:20px;border-radius:10px;box-shadow:0 5px 10px rgba(0,0,0,0.2);}
.sticker span{font-size:60px;}
</style>
</head>
<body>
<h1>🚀 Space Stickers</h1>
<div class="grid">
<div class="sticker"><span>🚀</span><p>Rocket</p></div>
<div class="sticker"><span>👽</span><p>Alien</p></div>
<div class="sticker"><span>🪐</span><p>Planet</p></div>
<div class="sticker"><span>🌍</span><p>Earth</p></div>
<div class="sticker"><span>⭐</span><p>Star</p></div>
<div class="sticker"><span>🌙</span><p>Moon</p></div>
<div class="sticker"><span>☄️</span><p>Comet</p></div>
<div class="sticker"><span>✨</span><p>Galaxy</p></div>
</div>
<br>
<a href="index.html">⬅ Back</a>
</body>
</html>
